groups:
  - name: mlops_alerts
    rules:
      - alert: ModelConfidenceDrift
        expr: prediction_confidence_score < 0.673
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Model confidence has dropped below threshold"
          description: "prediction_confidence_score is {{ $value }}, which is below the threshold of 0.673 for more than 1 minute."
